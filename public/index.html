<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Viewer - Screen Share</title>
  <style>
    :root{color-scheme:dark}
    html,body{margin:0;background:#000;color:#fff;font-family:system-ui;height:100%}
    .bar{padding:10px;background:#111;display:flex;gap:10px;align-items:center;position:fixed;top:0;left:0;right:0;z-index:5}
    .dot{width:10px;height:10px;border-radius:50%;background:#777}.ok{background:#22c55e}
    #wrap{position:fixed;inset:44px 0 0 0;background:#000}
    #v{width:100%;height:100%;object-fit:contain;background:#000}
    .controls{position:fixed;right:10px;bottom:10px;z-index:6;display:flex;gap:8px}
    button{background:#1f1f1f;color:#fff;border:1px solid #333;border-radius:10px;padding:10px 12px}
    .theater .bar{display:none}
    .theater #wrap{inset:0}
  </style>
</head>
<body>
  <div class="bar"><div id="dot" class="dot"></div><b>Viewer</b><span id="s">Conectando...</span></div>
  <div id="wrap"><video id="v" autoplay playsinline></video></div>
  <div class="controls">
    <button id="modeBtn">Pantalla completa</button>
  </div>
<script>
const s = document.getElementById('s');
const dot = document.getElementById('dot');
const v = document.getElementById('v');
const modeBtn = document.getElementById('modeBtn');

const ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host);
const pc = new RTCPeerConnection({ iceServers:[{urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302']}] });

pc.ontrack = async (e)=>{ v.srcObject = e.streams[0]; try{await v.play();}catch{} };
pc.onconnectionstatechange = ()=>{ s.textContent = pc.connectionState; };
pc.onicecandidate = (e)=>{ if(e.candidate && window.casterId) ws.send(JSON.stringify({type:'ice',to:window.casterId,candidate:e.candidate})); };

ws.onopen = ()=>{ dot.classList.add('ok'); s.textContent='Conectado. Esperando emisor...'; };
ws.onclose = ()=>{ dot.classList.remove('ok'); s.textContent='Desconectado'; };
ws.onmessage = async (ev)=>{
  const m = JSON.parse(ev.data);
  if(m.type==='welcome') ws.send(JSON.stringify({type:'viewer-join'}));
  if(m.type==='offer'){
    window.casterId = m.from;
    await pc.setRemoteDescription(new RTCSessionDescription(m.sdp));
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    ws.send(JSON.stringify({type:'answer',to:window.casterId,sdp:ans}));
    s.textContent = 'Recibiendo stream...';
  }
  if(m.type==='ice' && m.from===window.casterId && m.candidate){ try{ await pc.addIceCandidate(new RTCIceCandidate(m.candidate)); }catch{} }
  if(m.type==='caster-left') s.textContent = 'El emisor se desconectó';
};

async function trueFullscreen(){
  const el = document.documentElement;
  try{ if (!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen(); }catch{}
}

modeBtn.onclick = async ()=>{
  document.body.classList.toggle('theater');
  await trueFullscreen();
};

let wakeLock;
async function keepAwake(){ try{ wakeLock = await navigator.wakeLock?.request('screen'); }catch{} }
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') keepAwake(); });
keepAwake();
</script>
</body>
</html>
