<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Viewer</title>
  <style>
    html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui}
    .bar{padding:10px;background:#111;display:flex;gap:10px;align-items:center}
    #v{width:100vw;height:calc(100vh - 42px);background:#000;object-fit:contain}
    button{position:fixed;right:10px;bottom:10px;padding:10px;border-radius:10px;border:1px solid #333;background:#1f1f1f;color:#fff}
  </style>
</head>
<body>
  <div class="bar"><b>Viewer</b><span id="s">Conectando...</span></div>
  <video id="v" autoplay playsinline></video>
  <button id="fs">Pantalla completa</button>
<script>
const s = document.getElementById('s');
const v = document.getElementById('v');
const fs = document.getElementById('fs');

const ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host);
const pc = new RTCPeerConnection({iceServers:[{urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302']}]});
let casterId;

pc.ontrack = async (e)=>{ v.srcObject = e.streams[0]; try{await v.play();}catch{}; s.textContent='Recibiendo stream...'; };
pc.onicecandidate = (e)=>{ if(e.candidate && casterId) ws.send(JSON.stringify({type:'ice',to:casterId,candidate:e.candidate})); };

ws.onopen = ()=>{ s.textContent='Esperando emisor...'; ws.send(JSON.stringify({type:'viewer-join'})); };
ws.onclose = ()=>{ s.textContent='Desconectado'; };
ws.onmessage = async (ev)=>{
  const m = JSON.parse(ev.data);
  if(m.type==='offer'){
    casterId = m.from;
    await pc.setRemoteDescription(new RTCSessionDescription(m.sdp));
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    ws.send(JSON.stringify({type:'answer',to:casterId,sdp:ans}));
  }
  if(m.type==='ice' && m.from===casterId && m.candidate){ try{ await pc.addIceCandidate(new RTCIceCandidate(m.candidate)); }catch{} }
  if(m.type==='caster-left') s.textContent='El emisor se desconectó';
};

fs.onclick = async ()=>{ try{ await document.documentElement.requestFullscreen(); }catch{} };
</script>
</body>
</html>
