<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Viewer</title>
  <style>
    html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui}
    .bar{padding:10px;background:#111;display:flex;gap:10px;align-items:center}
    #v{width:100vw;height:calc(100vh - 42px);background:#000;object-fit:contain}
    button{position:fixed;right:10px;bottom:10px;padding:10px;border-radius:10px;border:1px solid #333;background:#1f1f1f;color:#fff}
  </style>
</head>
<body>
  <div class="bar"><b>Viewer</b><span id="s">Cargando...</span></div>
  <video id="v" autoplay playsinline></video>
  <button id="fs">Pantalla completa</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (async()=>{
    const s = document.getElementById('s');
    const v = document.getElementById('v');
    const fs = document.getElementById('fs');

    const cfg = await fetch('/api/env').then(r=>r.json()).catch(()=>({}));
    if(!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY){
      s.textContent = 'Faltan variables Supabase en Vercel';
      return;
    }

    const ROOM = (cfg.APP_NAME || 'caster') + '-room';
    const viewerId = crypto.randomUUID();
    const client = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const pc = new RTCPeerConnection({iceServers:[{urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302']}]});
    let casterId = null;

    pc.ontrack = async (e)=>{
      v.srcObject = e.streams[0];
      try{ await v.play(); }catch{}
      s.textContent = 'Recibiendo stream...';
    };

    const channel = client.channel('signal-' + ROOM, { config: { broadcast: { self: true } } });

    pc.onicecandidate = async (e)=>{
      if (!e.candidate || !casterId) return;
      await channel.send({
        type:'broadcast', event:'sig',
        payload:{ room:ROOM, from:viewerId, to:casterId, kind:'ice', candidate:e.candidate }
      });
    };

    channel.on('broadcast', {event:'sig'}, async ({payload})=>{
      if (payload.to !== viewerId) return;

      if (payload.kind === 'offer') {
        casterId = payload.from;
        await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
        const ans = await pc.createAnswer();
        await pc.setLocalDescription(ans);
        await channel.send({
          type:'broadcast', event:'sig',
          payload:{ room:ROOM, from:viewerId, to:casterId, kind:'answer', sdp:ans }
        });
      }

      if (payload.kind === 'ice' && payload.candidate) {
        try { await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); } catch {}
      }
    });

    await channel.subscribe(async (status)=>{
      if (status === 'SUBSCRIBED') {
        s.textContent = 'Esperando emisor...';
        await channel.send({
          type:'broadcast', event:'sig',
          payload:{ room:ROOM, from:viewerId, to:'caster', kind:'viewer-join' }
        });
      }
    });

    setInterval(async ()=>{
      await channel.send({
        type:'broadcast', event:'sig',
        payload:{ room:ROOM, from:viewerId, to:'caster', kind:'viewer-join' }
      });
    }, 3000);

    fs.onclick = async ()=>{ try{ await document.documentElement.requestFullscreen(); }catch{} };
  })();
  </script>
</body>
</html>
