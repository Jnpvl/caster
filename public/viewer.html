<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;background:#0a0a0f;color:#f0f0f8;font-family:'DM Sans',sans-serif}
    .wrap{max-width:1400px;margin:0 auto;padding:14px}
    .hero h1{margin:0 0 6px;font-family:'Syne',sans-serif;font-size:38px}
    .muted{color:#9696b3}
    .card{margin-top:16px;background:#13131a;border:1px solid #2a2a38;border-radius:16px;overflow:hidden}
    .head{padding:14px 18px;border-bottom:1px solid #2a2a38;display:flex;justify-content:space-between;align-items:center}
    .pill{padding:6px 10px;border-radius:999px;border:1px solid #2a2a38;background:#1c1c26;color:#9ea0bb;font-size:12px}
    .body{padding:16px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input,button{padding:11px 12px;border-radius:10px;border:1px solid #333;background:#1a1a26;color:#fff}
    button{cursor:pointer;border:0}
    .btnPrimary{background:#7c6af7}.btnGhost{background:#1f1f1f;border:1px solid #333}
    .panel.hidden{display:none}
    #videoWrap{margin-top:14px;border:1px solid #2a2a38;border-radius:12px;background:#000;overflow:hidden;height:calc(100vh - 180px)}
    #v{width:100%;height:100%;display:block;object-fit:contain;background:#000}
    .controls{margin-top:10px;display:flex;gap:8px}
    body.fullscreen-ui .wrap{max-width:none;padding:0}
    body.fullscreen-ui .hero, body.fullscreen-ui .head, body.fullscreen-ui .panel{display:none}
    body.fullscreen-ui .card{border:none;border-radius:0}
    body.fullscreen-ui .body{padding:0}
    body.fullscreen-ui #videoWrap{margin:0;height:100vh;border:none;border-radius:0}
    body.fullscreen-ui .controls{position:fixed;right:12px;bottom:12px;z-index:20;margin:0}
    .controls.hidden{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Viewer</h1>
      <div class="muted">Conéctate a una sala para ver la transmisión</div>
    </div>

    <div class="card">
      <div class="head">
        <strong>Receptor</strong>
        <span class="pill" id="s">Configura sala</span>
      </div>
      <div class="body">
        <div class="panel" id="panel">
          <div class="row">
            <input id="room" placeholder="Nombre de sala" />
            <input id="pin" placeholder="PIN (opcional)" />
            <button id="join" class="btnPrimary">Entrar</button>
          </div>
        </div>

        <div id="videoWrap">
          <video id="v" autoplay playsinline muted></video>
        </div>

        <div class="controls hidden" id="controls">
          <button id="fs" class="btnGhost">Pantalla completa</button>
          <button id="leave" class="btnGhost">Desconectar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (async()=>{
    const s = document.getElementById('s');
    const v = document.getElementById('v');
    const fs = document.getElementById('fs');
    const leaveBtn = document.getElementById('leave');
    const panel = document.getElementById('panel');
    const controls = document.getElementById('controls');
    const roomInput = document.getElementById('room');
    const pinInput = document.getElementById('pin');
    const joinBtn = document.getElementById('join');

    const cfg = await fetch('/api/env').then(r=>r.json()).catch(()=>({}));
    if(!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY){ s.textContent='Faltan variables Supabase'; return; }

    const client = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const viewerId = crypto.randomUUID();
    let channel, pc, casterId;
    const remoteStream = new MediaStream();
    v.srcObject = remoteStream;

    const params = new URLSearchParams(location.search);
    if (params.get('room')) roomInput.value = params.get('room');
    if (params.get('pin')) pinInput.value = params.get('pin');

    function roomKey(room){ return (cfg.APP_NAME||'caster') + '-room-' + room; }

    async function disconnect(message='Desconectado'){
      if (window.__joinTimer) { clearInterval(window.__joinTimer); window.__joinTimer = null; }
      try{ if(channel){ await channel.unsubscribe(); channel = null; } }catch{}
      try{ if(pc){ pc.ontrack = null; pc.onicecandidate = null; pc.onconnectionstatechange = null; pc.close(); pc = null; } }catch{}
      try{ if(v.srcObject){ v.srcObject.getTracks().forEach(t=>t.stop()); } }catch{}
      v.srcObject = null;
      casterId = null;
      s.textContent = message;
      panel.classList.remove('hidden');
      controls.classList.add('hidden');
    }

    joinBtn.onclick = async ()=>{
      const room = roomInput.value.trim();
      const pin = pinInput.value.trim();
      if(!room){ s.textContent='Pon nombre de sala'; return; }

      await disconnect('Conectando...');
      pc = new RTCPeerConnection({iceServers:[{urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302']}]});
      pc.ontrack = async (e)=>{
        if (e.streams && e.streams[0]) {
          v.srcObject = e.streams[0];
        } else if (e.track) {
          remoteStream.addTrack(e.track);
          v.srcObject = remoteStream;
        }
        if (e.track) e.track.onunmute = async ()=>{ try{ await v.play(); }catch{} };
        try{ await v.play(); }catch{}
        s.textContent='Recibiendo stream...';
      };
      pc.onconnectionstatechange = ()=>{ if (pc?.connectionState === 'connected') s.textContent = 'Conectado'; };

      channel = client.channel('signal-'+roomKey(room), { config:{ broadcast:{ self:true } } });
      pc.onicecandidate = async (e)=>{ if(!e.candidate || !casterId) return; await channel.send({type:'broadcast',event:'sig',payload:{from:viewerId,to:casterId,kind:'ice',candidate:e.candidate,pin}}); };

      channel.on('broadcast',{event:'sig'}, async ({payload})=>{
        if(!payload || (payload.to!==viewerId && payload.to!=='all')) return;
        if(payload.kind==='denied'){ s.textContent='PIN incorrecto / acceso denegado'; panel.classList.remove('hidden'); return; }
        if(payload.kind==='offer'){
          casterId=payload.from;
          await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
          const ans=await pc.createAnswer();
          await pc.setLocalDescription(ans);
          await channel.send({type:'broadcast',event:'sig',payload:{from:viewerId,to:casterId,kind:'answer',sdp:ans,pin}});
          panel.classList.add('hidden');
          controls.classList.remove('hidden');
          if (window.__joinTimer) { clearInterval(window.__joinTimer); window.__joinTimer = null; }
        }
        if(payload.kind==='ice'&&payload.candidate){ try{await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));}catch{} }
        if(payload.kind==='caster-stopped'){ await disconnect('Desconectado'); return; }
      });

      const announceJoin = async ()=>{ await channel.send({type:'broadcast',event:'sig',payload:{from:viewerId,to:'caster',kind:'viewer-join',pin}}); };
      await channel.subscribe(async (st)=>{ if(st==='SUBSCRIBED'){ s.textContent='Esperando emisor...'; await announceJoin(); }});
      window.__joinTimer && clearInterval(window.__joinTimer);
      window.__joinTimer = setInterval(async ()=>{ if (!casterId) await announceJoin(); }, 2500);
    };

    leaveBtn.onclick = ()=>disconnect('Desconectado');
    fs.onclick = async ()=>{
      document.body.classList.toggle('fullscreen-ui');
      try{ await document.documentElement.requestFullscreen(); }catch{}
    };

    if (roomInput.value) joinBtn.click();
  })();
  </script>
</body>
</html>
