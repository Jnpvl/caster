<!doctype html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Caster</title><style>body{font-family:system-ui;background:#0b0b12;color:#fff;padding:20px}button{padding:12px 16px;border-radius:10px;border:0;background:#6d5efc;color:#fff;font-weight:700}.url{margin:10px 0;padding:10px;background:#171723;border:1px solid #2a2a3d;border-radius:10px;font-family:monospace}#log{margin-top:12px;color:#bcbcd3}</style></head><body><h2>Caster</h2><div class="url">Viewer: <span id="u"></span></div><button id="cast">Compartir pantalla</button><div id="log">Cargando...</div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
(async()=>{
 const log=t=>document.getElementById('log').textContent=t;
 document.getElementById('u').textContent=location.origin+'/viewer';
 const cfg=await fetch('/api/env').then(r=>r.json()).catch(()=>({}));
 if(!cfg.SUPABASE_URL||!cfg.SUPABASE_ANON_KEY){log('Faltan variables Supabase en Vercel');return;}
 const ROOM=(cfg.APP_NAME||'caster')+'-room';
 const client=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
 const casterId=crypto.randomUUID(); const pcs=new Map(); let stream;
 const ch=client.channel('signal-'+ROOM,{config:{broadcast:{self:true}}});
 ch.on('broadcast',{event:'sig'},async ({payload})=>{
  if(payload.to!==casterId && payload.to!=='caster') return;
  if(payload.kind==='viewer-join'&&stream){const id=payload.from;const pc=new RTCPeerConnection({iceServers:[{urls:['stun:stun.l.google.com:19302']}]});pcs.set(id,pc);stream.getTracks().forEach(t=>pc.addTrack(t,stream));pc.onicecandidate=async e=>{if(e.candidate)await ch.send({type:'broadcast',event:'sig',payload:{room:ROOM,from:casterId,to:id,kind:'ice',candidate:e.candidate}})};const offer=await pc.createOffer();await pc.setLocalDescription(offer);await ch.send({type:'broadcast',event:'sig',payload:{room:ROOM,from:casterId,to:id,kind:'offer',sdp:offer}});log('Viewer conectado: '+id.slice(0,8));}
  if(payload.kind==='answer'){const pc=pcs.get(payload.from);if(pc)await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));}
  if(payload.kind==='ice'){const pc=pcs.get(payload.from);if(pc&&payload.candidate){try{await pc.addIceCandidate(new RTCIceCandidate(payload.candidate))}catch{}}}
 }).subscribe(()=>log('Listo para compartir'));
 document.getElementById('cast').onclick=async()=>{try{stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:{ideal:30,max:60},width:{ideal:1280},height:{ideal:720}},audio:true});log('Transmitiendo. Comparte: '+location.origin+'/viewer')}catch(e){log('Error: '+e.message)}};
})();
</script></body></html>
