<!doctype html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Caster</title><style>body{font-family:system-ui;background:#0b0b12;color:#fff;padding:20px}input,button{padding:10px;border-radius:8px;border:1px solid #333;background:#1a1a26;color:#fff}button{cursor:pointer;background:#6d5efc;border:0}.row{display:flex;gap:8px;flex-wrap:wrap}.url{margin:10px 0;padding:10px;background:#171723;border:1px solid #2a2a3d;border-radius:10px;font-family:monospace}#log{margin-top:12px;color:#bcbcd3}</style></head><body><h2>Caster</h2><div class="row"><input id="room" placeholder="Nombre de sala"/><input id="pin" placeholder="PIN opcional"/><button id="prepare">Preparar sala</button><button id="cast">Compartir pantalla</button></div><div class="url">Viewer URL: <span id="u">-</span></div><div id="log">Configura sala</div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script>
(async()=>{
 const $=id=>document.getElementById(id); const log=t=>$('log').textContent=t;
 const cfg=await fetch('/api/env').then(r=>r.json()).catch(()=>({}));
 if(!cfg.SUPABASE_URL||!cfg.SUPABASE_ANON_KEY){log('Faltan variables Supabase');return;}
 const client=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
 const casterId=crypto.randomUUID(); let stream=null; let channel=null; let room=''; let pin=''; const pcs=new Map();
 const roomKey=r=>(cfg.APP_NAME||'caster')+'-room-'+r;

 async function setupChannel(){
   if(channel) await channel.unsubscribe();
   channel=client.channel('signal-'+roomKey(room),{config:{broadcast:{self:true}}});
   channel.on('broadcast',{event:'sig'}, async ({payload})=>{
     if(payload.to!==casterId && payload.to!=='caster') return;
     if(pin && payload.pin!==pin){
       if(payload.from) await channel.send({type:'broadcast',event:'sig',payload:{from:casterId,to:payload.from,kind:'denied'}});
       return;
     }
     if(payload.kind==='viewer-join'&&stream){
       const id=payload.from; if(pcs.has(id)) return;
       const pc=new RTCPeerConnection({iceServers:[{urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302']}]});
       pcs.set(id,pc); stream.getTracks().forEach(t=>pc.addTrack(t,stream));
       pc.onicecandidate=async e=>{if(e.candidate) await channel.send({type:'broadcast',event:'sig',payload:{from:casterId,to:id,kind:'ice',candidate:e.candidate,pin}})};
       const offer=await pc.createOffer(); await pc.setLocalDescription(offer);
       await channel.send({type:'broadcast',event:'sig',payload:{from:casterId,to:id,kind:'offer',sdp:offer,pin}});
       log('Viewer conectado: '+id.slice(0,8));
     }
     if(payload.kind==='answer'){ const pc=pcs.get(payload.from); if(pc) await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp)); }
     if(payload.kind==='ice'){ const pc=pcs.get(payload.from); if(pc&&payload.candidate){ try{await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));}catch{} } }
   });
   await channel.subscribe(()=>{});
 }

 $('prepare').onclick=async ()=>{
   room=$('room').value.trim(); pin=$('pin').value.trim();
   if(!room){log('Pon nombre de sala');return;}
   await setupChannel();
   const q = pin ? ('?room='+encodeURIComponent(room)+'&pin='+encodeURIComponent(pin)) : ('?room='+encodeURIComponent(room));
   $('u').textContent=location.origin+'/viewer'+q;
   log('Sala lista: '+room+(pin?' (con PIN)':''));
 };

 $('cast').onclick=async ()=>{
   if(!room){log('Primero prepara sala');return;}
   if(stream) return;
   try{stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:{ideal:30,max:60},width:{ideal:1280},height:{ideal:720}},audio:true});log('Transmitiendo en sala '+room);stream.getVideoTracks()[0].onended=()=>{stream=null;pcs.forEach(pc=>pc.close());pcs.clear();log('Transmisión detenida');};}
   catch(e){log('Error: '+e.message)}
 };

 const params=new URLSearchParams(location.search);
 if(params.get('room')) $('room').value=params.get('room');
 if(params.get('pin')) $('pin').value=params.get('pin');
})();
</script></body></html>
