<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Caster — Comparte tu pantalla</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box} body{margin:0;background:#0a0a0f;color:#f0f0f8;font-family:'DM Sans',sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:28px}
.hero{margin-bottom:18px}.hero h1{font-family:Syne,sans-serif;margin:0 0 6px;font-size:42px}.muted{color:#9696b3}
.card{background:#13131a;border:1px solid #2a2a38;border-radius:16px;overflow:hidden}
.head{padding:18px 20px;border-bottom:1px solid #2a2a38;display:flex;justify-content:space-between;align-items:center}
.pill{padding:6px 10px;border-radius:999px;border:1px solid #2a2a38;background:#1c1c26;color:#9ea0bb;font-size:12px}
.pill.live{background:rgba(29,158,117,.12);border-color:rgba(29,158,117,.35);color:#56d7ac}
.body{padding:20px}
.row{display:flex;gap:10px;flex-wrap:wrap}
input,button{padding:11px 12px;border-radius:10px;border:1px solid #333;background:#1a1a26;color:#fff}
button{cursor:pointer;border:0}
.btnPrimary{background:#7c6af7}.btnOk{background:#2563eb}.btnDanger{background:#e24b4a}
.url{margin-top:12px;padding:10px;background:#1c1c26;border:1px solid #2a2a38;border-radius:10px;font-family:monospace;word-break:break-all}
.step{margin:10px 0 6px;font-weight:700;font-family:Syne,sans-serif}
#log{margin-top:12px;padding:10px;background:#1c1c26;border:1px solid #2a2a38;border-radius:8px;color:#c7c9e2}
.hidden{display:none}
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Caster</h1>
      <div class="muted">Comparte tu pantalla por sala con PIN opcional</div>
    </div>

    <div class="card">
      <div class="head">
        <strong>Sala en vivo</strong>
        <span class="pill" id="status">Inactivo</span>
      </div>
      <div class="body">
        <div class="step">Paso 1: Preparar sala</div>
        <div class="row" id="setupRow">
          <input id="room" placeholder="Nombre de sala" />
          <input id="pin" placeholder="PIN opcional" />
          <button id="prepare" class="btnPrimary">Preparar sala</button>
        </div>

        <div id="shareBlock" class="hidden">
          <div class="step">Paso 2: Compartir pantalla</div>
          <div class="row">
            <button id="cast" class="btnOk">Compartir pantalla</button>
            <button id="stop" class="btnDanger hidden">Detener</button>
          </div>
          <div class="url">Viewer URL: <span id="u">-</span></div>
        </div>

        <div id="log">Configura sala para continuar.</div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async()=>{
  const $=id=>document.getElementById(id);
  const log=t=>$('log').textContent=t;
  const setStatus=(t,live=false)=>{ $('status').textContent=t; $('status').className='pill'+(live?' live':''); };

  const cfg=await fetch('/api/env').then(r=>r.json()).catch(()=>({}));
  if(!cfg.SUPABASE_URL||!cfg.SUPABASE_ANON_KEY){log('Faltan variables Supabase');return;}

  const client=supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);
  const casterId=crypto.randomUUID();
  let stream=null,channel=null,room='',pin='';
  const pcs=new Map();
  const roomKey=r=>(cfg.APP_NAME||'caster')+'-room-'+r;

  async function setupChannel(){
    if(channel) await channel.unsubscribe();
    channel=client.channel('signal-'+roomKey(room),{config:{broadcast:{self:true}}});
    channel.on('broadcast',{event:'sig'},async ({payload})=>{
      if(payload.to!==casterId && payload.to!=='caster') return;
      if(pin && payload.pin!==pin){
        if(payload.from) await channel.send({type:'broadcast',event:'sig',payload:{from:casterId,to:payload.from,kind:'denied'}});
        return;
      }
      if(payload.kind==='viewer-join'&&stream){
        const id=payload.from; if(pcs.has(id)) return;
        const pc=new RTCPeerConnection({iceServers:[{urls:['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302']}]});
        pcs.set(id,pc);
        stream.getTracks().forEach(t=>pc.addTrack(t,stream));
        pc.onicecandidate=async e=>{ if(e.candidate) await channel.send({type:'broadcast',event:'sig',payload:{from:casterId,to:id,kind:'ice',candidate:e.candidate,pin}}); };
        const offer=await pc.createOffer(); await pc.setLocalDescription(offer);
        await channel.send({type:'broadcast',event:'sig',payload:{from:casterId,to:id,kind:'offer',sdp:offer,pin}});
      }
      if(payload.kind==='answer'){ const pc=pcs.get(payload.from); if(pc) await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp)); }
      if(payload.kind==='ice'){ const pc=pcs.get(payload.from); if(pc&&payload.candidate){ try{ await pc.addIceCandidate(new RTCIceCandidate(payload.candidate)); }catch{} } }
    });
    await channel.subscribe(()=>{});
  }

  $('prepare').onclick=async ()=>{
    room=$('room').value.trim(); pin=$('pin').value.trim();
    if(!room){log('Pon nombre de sala');return;}
    await setupChannel();
    const q=pin?`?room=${encodeURIComponent(room)}&pin=${encodeURIComponent(pin)}`:`?room=${encodeURIComponent(room)}`;
    $('u').textContent=location.origin+'/viewer'+q;
    $('shareBlock').classList.remove('hidden');
    setStatus('Sala preparada');
    log('Sala lista. Ahora comparte pantalla.');
  };

  $('cast').onclick=async ()=>{
    if(!room){log('Primero prepara sala');return;}
    if(stream) return;
    try{
      stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:{ideal:30,max:60},width:{ideal:1280},height:{ideal:720}},audio:true});
      $('stop').classList.remove('hidden');
      setStatus('Transmitiendo',true);
      log('Transmitiendo en sala '+room);
      stream.getVideoTracks()[0].onended=()=>$('stop').click();
    }catch(e){log('Error: '+e.message)}
  };

  $('stop').onclick=async ()=>{
    if (channel) {
      await channel.send({type:'broadcast',event:'sig',payload:{from:casterId,to:'all',kind:'caster-stopped',ts:Date.now()}});
    }
    if(stream){stream.getTracks().forEach(t=>t.stop()); stream=null;}
    pcs.forEach(pc=>pc.close()); pcs.clear();
    $('stop').classList.add('hidden');
    setStatus('Sala preparada');
    log('Transmisión detenida.');
  };
})();
</script>
</body>
</html>
